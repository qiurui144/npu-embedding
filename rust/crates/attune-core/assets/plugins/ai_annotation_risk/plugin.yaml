id: ai_annotation_risk
name: AI 风险批注
type: annotation_angle
version: "1.0.0"
author: attune-team
category: general
description: 从原文中找出风险、陷阱、安全漏洞、必须注意的事项

# 批注外观（用户/UI 侧）
label_prefix: "⚠️ 风险"
default_color: red

# LLM 约束
constraints:
  max_findings: 5
  max_snippet_chars: 150
  min_snippet_chars: 4
  temperature: 0.3

# Prompt 文件（与 plugin.yaml 同目录）
prompt_file: prompt.md

# JSON Schema 约束（输出必须 match）—— 参照
# `@attune-lawcontrol/schemas/annotation_findings.v1.json`（未来独立发包）
output:
  schema:
    type: object
    required: [findings]
    properties:
      findings:
        type: array
        items:
          type: object
          required: [snippet, reason]
          properties:
            snippet: {type: string, minLength: 4, maxLength: 150}
            reason: {type: string, minLength: 10, maxLength: 200}
