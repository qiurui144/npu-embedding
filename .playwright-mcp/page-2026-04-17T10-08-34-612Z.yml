          - generic [ref=e64]: Rust 的所有权系统是其内存安全保证的核心。每个值都有一个被称为其所有者的变量，值在任一时刻有且只有一个所有者。当所有者离开作用域，值将被丢弃。 所有权规则： 1. Rust 中每个值都有一个所有者 2. 值在任一时刻有且只有一个所有者 3. 当所有者离开作用域时，这个值将被丢弃 借用（borrowing）允许通过引用使用值而不获取其所有权。借用检查器在编译时验证所有引用都是有效的，防止悬垂
